name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: "VITE_API_URL (e.g. https://vitalplan-api.onrender.com/api)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build for GitHub Pages
        env:
          VITE_BASE: /VitalPlan/
          VITE_DISABLE_PWA: "1"
          VITE_API_URL: ${{ inputs.api_url || vars.VITE_API_URL || 'https://vitalplan-api.onrender.com/api' }}
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
