# Render Blueprint — one-click backend deploy
# https://dashboard.render.com/blueprints
#
# GitHub Pages cannot run FastAPI. This service hosts the live API + Swagger UI.
# After deploy, set the GitHub repo variable VITE_API_URL to:
#   https://<this-service>.onrender.com/api
# then re-run the Pages deploy workflow.

services:
  - type: web
    name: vitalplan-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_REGISTRATION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./vitalplan.db
      - key: ALLOWED_HOSTS
        value: '["https://amulyavarshney.github.io","http://localhost:5173","http://127.0.0.1:5173"]'
      - key: FRONTEND_URL
        value: https://amulyavarshney.github.io/VitalPlan
      - key: PUBLIC_URL
        value: https://vitalplan-api.onrender.com
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "false"
      - key: LOG_FORMAT
        value: json
